name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tagName:
        description: "Release tag to create or update, for example v0.1.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows-installer:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tagName }}
          releaseName: "Clip Studio Presence ${{ github.ref_type == 'tag' && github.ref_name || inputs.tagName }}"
          releaseBody: "Windows installers are attached below."
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          args: "--bundles nsis"
          releaseAssetNamePattern: "[name]_[version]_[platform]_[arch].[ext]"
