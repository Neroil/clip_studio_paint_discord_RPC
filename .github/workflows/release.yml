name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tagName:
        description: "Release tag to create or update, for example v0.1.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows-installer:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri installer
        run: npm run tauri build -- --bundles nsis

      - name: Upload installer to GitHub release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tagName }}
        run: |
          $installer = Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter "*setup.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "No NSIS setup installer was produced."
          }

          gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:RELEASE_TAG --title "Clip Studio Presence $env:RELEASE_TAG" --notes "Windows setup installer is attached below." --generate-notes
          }

          gh release upload $env:RELEASE_TAG $installer.FullName --clobber
